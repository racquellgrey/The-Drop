name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Principle of least privilege: the token can only read repo contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Verify no .env files are tracked
  # ────────────────────────────────────────────────────────────
  verify-no-env:
    name: Verify no .env tracked
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any .env is tracked
        run: |
          set -e
          tracked=$(git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -v '\.env\.example$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::Tracked .env files detected:"
            echo "$tracked"
            exit 1
          fi
          echo "OK: no .env files tracked."

  # ────────────────────────────────────────────────────────────
  # 2. Install, syntax check, and dependency audit
  # ────────────────────────────────────────────────────────────
  build-and-audit:
    name: Install, syntax-check, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps (ci, no scripts)
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Node syntax check
        working-directory: backend
        run: npm run lint:syntax

      - name: Require api/index.js loads without error
        run: node --check api/index.js

      - name: npm audit (high + critical)
        working-directory: backend
        run: npm audit --audit-level=high

  # ────────────────────────────────────────────────────────────
  # 3. Validate vercel.json schema
  # ────────────────────────────────────────────────────────────
  validate-vercel:
    name: Validate vercel.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Parse vercel.json
        run: node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8')); console.log('vercel.json is valid JSON')"

  # ────────────────────────────────────────────────────────────
  # 4. Deploy preview on PRs (same-repo only)
  # ────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    needs: [verify-no-env, build-and-audit, validate-vercel]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings (preview)
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Vercel artifacts
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy Preview to Vercel
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ────────────────────────────────────────────────────────────
  # 5. Deploy production on main
  # ────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: [verify-no-env, build-and-audit, validate-vercel]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Vercel artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy Production to Vercel
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
